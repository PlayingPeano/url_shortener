name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: pytest -q

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: url-shortener:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [infra/terraform, infra/k8s-cluster]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate -no-color

  deploy:
    name: deploy to VM
    runs-on: ubuntu-latest
    needs: [tests, docker-build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only
            docker compose up -d --build api
            docker image prune -f

  push-image:
    name: build & push image to cr.yandex
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Authenticate yc with SA JSON key
        env:
          YC_SA_JSON_KEY: ${{ secrets.YC_SA_JSON_KEY }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          printf '%s' "$YC_SA_JSON_KEY" > /tmp/sa-key.json
          yc config profile create ci 2>/dev/null || yc config profile activate ci
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$YC_FOLDER_ID"
          yc config set format json

      - name: Configure Docker for cr.yandex
        run: yc container registry configure-docker

      - id: meta
        env:
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="cr.yandex/${YC_REGISTRY_ID}/url-shortener:${TAG}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/url-shortener:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k8s:
    name: deploy to Managed K8s
    runs-on: ubuntu-latest
    needs: [push-image]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.2

      - name: Authenticate yc + write kubeconfig
        env:
          YC_SA_JSON_KEY: ${{ secrets.YC_SA_JSON_KEY }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_K8S_CLUSTER_ID: ${{ secrets.YC_K8S_CLUSTER_ID }}
        run: |
          printf '%s' "$YC_SA_JSON_KEY" > /tmp/sa-key.json
          yc config profile create ci 2>/dev/null || yc config profile activate ci
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$YC_FOLDER_ID"
          yc managed-kubernetes cluster get-credentials \
            --id "$YC_K8S_CLUSTER_ID" --external --force

      - name: Roll out new image
        run: |
          kubectl -n url-shortener set image deployment/api api=${{ needs.push-image.outputs.image }}
          kubectl -n url-shortener rollout status deployment/api --timeout=180s

      - name: Verify health
        run: |
          kubectl -n url-shortener get pods -l app=api -o wide
          kubectl -n url-shortener get deployment api -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo
