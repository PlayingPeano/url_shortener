# Let's Encrypt ClusterIssuer для cert-manager.
# Перед применением вставь свой реальный email вместо isaenkovcc@gmail.com
# (на него LE будет писать про истечение и проблемы с сертификатом).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: isaenkovcc@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
