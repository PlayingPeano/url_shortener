# Template для секретов. НЕ коммитить реальный файл с реальными значениями!
# Скопируй в secret.local.yaml, заполни и применяй:
#   cp secret.example.yaml secret.local.yaml
#   nano secret.local.yaml
#   kubectl apply -f secret.local.yaml
apiVersion: v1
kind: Secret
metadata:
  name: shortener-secrets
  namespace: url-shortener
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_password"
  API_KEY: "CHANGE_ME_api_key_hex_string"
