#cloud-config
users:
  - name: ${vm_user}
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - netcat-openbsd

runcmd:
  # Install Docker (official upstream packages)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker ${vm_user}
  # Enable nginx
  - systemctl enable --now nginx
  # Basic firewall: SSH + HTTP/HTTPS only
  - ufw allow OpenSSH
  - ufw allow 'Nginx Full'
  - yes | ufw enable

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      ============================================================
      URL Shortener VM (provisioned by Terraform)
      Next steps after first login:
        1) git clone git@github.com:PlayingPeano/url_shortener.git
        2) cd url_shortener && cp .env.example .env && nano .env
        3) docker compose up -d
        4) Setup DNS (DuckDNS) to point to this VM's public IP
        5) sudo certbot --nginx -d <your.domain>
        6) Edit /etc/nginx/sites-enabled/<name> with proxy_pass to API
      ============================================================
